name: Scheduled Notion Deploy

on:
  schedule:
    # ทุก 1 ชั่วโมง
    - cron: '0 * * * *'
  # สามารถ trigger manual ได้ด้วย
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel Deploy Hook
        run: curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
